<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Ingressos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Plataforma de Venda de Ingressos</h1>

        <form id="formEvento">

            <input type="text" id="nome" placeholder="Nome do Evento" required>

            <input type="text" id="local" placeholder="Local" required>

            <input type="date" id="data_evento" required>

            <input type="number" id="ingressos" placeholder="Ingressos" required>

            <button type="submit">
                Cadastrar Evento
            </button>

        </form>

        <h2>Eventos Cadastrados</h2>

        <div id="listaEventos"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
